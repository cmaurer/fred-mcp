name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    # Skip commits created by semantic-release itself to avoid infinite loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    permissions:
      contents: write      # push version bump commit + create tags/releases
      issues: write        # comment on issues referenced in commits
      pull-requests: write # comment on PRs referenced in commits

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so semantic-release can walk tags
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
